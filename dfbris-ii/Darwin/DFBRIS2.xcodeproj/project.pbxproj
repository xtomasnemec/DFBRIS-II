			shellPath = "/bin/sh -e";
			shellScript = "set -euo pipefail\n\n# -------------------------\n# Java\n# -------------------------\nexport JAVA_HOME=$(/usr/libexec/java_home -v 21)\nexport PATH=\"$JAVA_HOME/bin:$PATH\"\n\n# -------------------------\n# Root (Xcode-safe)\n# -------------------------\nROOT_DIR=\"${SRCROOT}\"\n\nPROJECT_DIR=\"$ROOT_DIR\"\n\nIOS_ASSET_DIR=\"$PROJECT_DIR/Assets.xcassets\"\nMODULE_ASSET_DIR=\"$PROJECT_DIR/../Sources/DFBRIS2/Resources/Module.xcassets\"\nANDROID_RES_DIR=\"$PROJECT_DIR/../Android/app/src/main/res\"\nANDROID_APP_ICON_SOURCE=\"$PROJECT_DIR/AppIcon.icon/Assets/Icon-App-1024x1024@1x.png\"\n\n# -------------------------\n# Android SDK\n# -------------------------\nexport ANDROID_HOME=\"${ANDROID_HOME:-$HOME/Library/Android/sdk}\"\n\n# -------------------------\n# Helpers\n# -------------------------\n\nsync_module_assets() {\n    echo \"note: syncing iOS assets → module\"\n\n    mkdir -p \"$MODULE_ASSET_DIR\"\n    cp -R \"$IOS_ASSET_DIR/.\" \"$MODULE_ASSET_DIR/\"\n}\n\nsync_android_launcher_icon() {\n    echo \"note: generating Android launcher icons\"\n\n    if [ ! -f \"$ANDROID_APP_ICON_SOURCE\" ]; then\n        echo \"error: missing icon: $ANDROID_APP_ICON_SOURCE\"\n        exit 1\n    fi\n\n    sizes=\"48 72 96 144 192\"\n    dirs=\"mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi\"\n\n    i=1\n    for size in $sizes; do\n        dir=$(echo $dirs | cut -d' ' -f$i)\n\n        target_dir=\"$ANDROID_RES_DIR/$dir\"\n        target_file=\"$target_dir/ic_launcher.png\"\n\n        mkdir -p \"$target_dir\"\n\n        sips -z \"$size\" \"$size\" \"$ANDROID_APP_ICON_SOURCE\" --out \"$target_file\" >/dev/null\n        chmod 644 \"$target_file\"\n\n        i=$((i + 1))\n    done\n}\n\n# -------------------------\n# Build context\n# -------------------------\n\necho \"note: SRCROOT=$SRCROOT\"\ncd \"$PROJECT_DIR\"\n\nsync_module_assets\nsync_android_launcher_icon\n\n# -------------------------\n# Skip logic\n# -------------------------\n\nif [ -n \"${SKIP_ZERO:-}\" ]; then\n  echo \"note: skipping skip due to SKIP_ZERO\"\n  exit 0\nelif [ \"${ENABLE_PREVIEWS:-NO}\" = \"YES\" ]; then\n  echo \"note: skipping skip due to ENABLE_PREVIEWS\"\n  exit 0\nelif [ \"${ACTION:-}\" = \"install\" ]; then\n  echo \"note: skipping skip due to archive install\"\n  exit 0\nelif [ \"${SKIP_ACTION:-}\" = \"none\" ]; then\n  echo \"note: skipping skip due to SKIP_ACTION none\"\n  exit 0\nelse\n  SKIP_ACTION=\"${SKIP_ACTION:-launch}\"\nfi\n\n# -------------------------\n# PATH setup (Xcode-safe)\n# -------------------------\n\nexport PATH=\"${BUILD_ROOT}/Release:${BUILD_ROOT}/Debug:${BUILD_ROOT}/../../SourcePackages/artifacts/skip/skip/skip.artifactbundle/macos:${PATH}\"\n\nif command -v brew >/dev/null 2>&1; then\n  export PATH=\"$PATH:$(brew --prefix)/bin\"\nfi\n\n# -------------------------\n# Run skip\n# -------------------------\n\nSKIP_BIN=\"$(command -v skip || true)\"\n\nif [ -z \"$SKIP_BIN\" ]; then\n  echo \"error: skip not found in PATH\"\n  exit 1\nfi\n\necho \"note: running skip gradle\"\necho \"$SKIP_BIN gradle -p ../Android ${SKIP_ACTION}${CONFIGURATION:-Debug}\"\n\n\"$SKIP_BIN\" gradle -p ../Android \"${SKIP_ACTION}${CONFIGURATION:-Debug}\"\n";
